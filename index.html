<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeilleCG</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --surface2: #f0ede8;
            --border: #e5e0d8;
            --fiscal-accent: #2563eb;
            --fiscal-light: #eff6ff;
            --compta-accent: #16a34a;
            --compta-light: #f0fdf4;
            --text: #1a1814;
            --text-muted: #78716c;
            --text-dim: #a8a29e;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(245,244,240,0.94);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 760px;
            margin: 0 auto;
            padding: 14px 20px 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
        }

        .logo em { font-style: normal; color: var(--fiscal-accent); }

        .update-pill {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px;
        }

        .search-bar {
            display: flex;
            gap: 8px;
        }

        .search-wrap { flex: 1; position: relative; }

        .search-wrap input {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px 10px 38px;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-wrap input:focus {
            border-color: var(--fiscal-accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .search-wrap input::placeholder { color: var(--text-dim); }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 15px;
        }

        .date-input {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            outline: none;
            min-width: 130px;
            transition: border-color 0.2s;
        }

        .date-input:focus { border-color: var(--fiscal-accent); }

        .btn-raz {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-raz:hover { border-color: var(--text-muted); color: var(--text); }

        .tabs {
            display: flex;
            max-width: 760px;
            margin: 12px auto 0;
            padding: 0 20px;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            background: none;
            border: none;
            border-radius: 10px 10px 0 0;
            color: var(--text-muted);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .tab-btn.active-fiscal { color: var(--fiscal-accent); background: var(--fiscal-light); }
        .tab-btn.active-fiscal .tab-dot { opacity: 1; }
        .tab-btn.active-compta { color: var(--compta-accent); background: var(--compta-light); }
        .tab-btn.active-compta .tab-dot { opacity: 1; }

        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 20px 100px;
        }

        .stats-bar {
            margin-bottom: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Featured card */
        .card-featured {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            transition: box-shadow 0.25s, transform 0.25s;
            position: relative;
            overflow: hidden;
        }

        .card-featured::after {
            content: 'À LA UNE';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px;
            font-weight: 500;
            letter-spacing: 1.5px;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .card-featured.fiscal::after {
            color: var(--fiscal-accent);
            background: var(--fiscal-light);
        }

        .card-featured.compta::after {
            color: var(--compta-accent);
            background: var(--compta-light);
        }

        .card-featured:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .card-featured .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 21px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 12px;
            padding-right: 80px;
        }

        /* Regular card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
        }

        .card .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text);
            margin-bottom: 8px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .source-badge {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .source-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
        }

        .fiscal .source-dot { background: var(--fiscal-accent); }
        .compta .source-dot { background: var(--compta-accent); }

        .source-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .card-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
        }

        .card-summary {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.65;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.15s;
        }

        .fiscal .card-link { color: var(--fiscal-accent); background: var(--fiscal-light); }
        .fiscal .card-link:hover { background: var(--fiscal-accent); color: white; }
        .compta .card-link { color: var(--compta-accent); background: var(--compta-light); }
        .compta .card-link:hover { background: var(--compta-accent); color: white; }

        .card-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 5px;
        }

        .fiscal .card-tag { color: var(--fiscal-accent); background: var(--fiscal-light); }
        .compta .card-tag { color: var(--compta-accent); background: var(--compta-light); }

        /* Skeleton */
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton {
            border-radius: 16px;
            height: 150px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #edeae4 25%, #f5f2ed 50%, #edeae4 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite;
        }

        .skeleton:first-child { height: 220px; border-radius: 20px; }

        .empty {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon { font-size: 36px; opacity: 0.25; margin-bottom: 14px; }

        .empty-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }

        footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(245,244,240,0.96);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            padding: 8px 20px;
            z-index: 100;
        }

        .footer-inner {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .footer-source {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--text-dim);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
        }

        .card, .card-featured { animation: fadeUp 0.3s ease both; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 520px) {
            .date-input { display: none; }
            .card-featured .card-title { font-size: 18px; padding-right: 0; }
            .card-featured::after { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="header-top">
            <div class="logo">Veille<em>CG</em></div>
            <div class="update-pill">↻ <span id="last-update">—</span></div>
        </div>
        <div class="search-bar">
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input type="text" id="search" placeholder="Rechercher…">
            </div>
            <input type="date" id="date-filter" class="date-input">
            <button class="btn-raz" onclick="resetFilters()">RAZ</button>
        </div>
    </div>
    <div class="tabs">
        <button class="tab-btn active-fiscal" id="tab-fiscal" onclick="switchTab('fiscal')">
            <span class="tab-dot"></span> Fiscal
        </button>
        <button class="tab-btn" id="tab-compta" onclick="switchTab('compta')">
            <span class="tab-dot"></span> Comptabilité
        </button>
    </div>
</header>

<main id="content">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
</main>

<footer>
    <div class="footer-inner">
        <span class="footer-source">Expert-Sup</span>
        <span class="footer-source">Le Monde du Chiffre</span>
        <span class="footer-source">Village Justice</span>
        <span class="footer-source">Valoxy</span>
        <span class="footer-source">ANC</span>
    </div>
</footer>

<script>
    let currentTab = 'fiscal';
    let newsData = [];
    const searchInput = document.getElementById('search');
    const dateInput = document.getElementById('date-filter');

    async function loadNews() {
        try {
            const r = await fetch('news.json?t=' + Date.now());
            if (!r.ok) throw new Error();
            newsData = await r.json();
            if (newsData.length > 0) {
                document.getElementById('last-update').textContent = newsData[0].date;
            }
            renderNews();
        } catch {
            document.getElementById('content').innerHTML = `
                <div class="empty">
                    <div class="empty-icon">⚠</div>
                    <div class="empty-text">Données non disponibles</div>
                </div>`;
        }
    }

    function renderNews() {
        const container = document.getElementById('content');
        container.innerHTML = '';

        const q = searchInput.value.toLowerCase().trim();
        const d = dateInput.value;

        const filtered = newsData.filter(item =>
            item.category === currentTab &&
            (!q || item.title.toLowerCase().includes(q) ||
                   item.summary.toLowerCase().includes(q) ||
                   item.source.toLowerCase().includes(q)) &&
            (!d || item.date_iso === d)
        );

        if (!filtered.length) {
            container.innerHTML = `<div class="empty"><div class="empty-icon">∅</div><div class="empty-text">Aucun résultat</div></div>`;
            return;
        }

        const stats = document.createElement('div');
        stats.className = 'stats-bar';
        stats.textContent = `${filtered.length} article${filtered.length > 1 ? 's' : ''}`;
        container.appendChild(stats);

        filtered.forEach((item, i) => {
            const featured = i === 0;
            const el = document.createElement('div');
            el.className = featured ? `card-featured ${item.category}` : `card ${item.category}`;
            el.style.animationDelay = `${i * 35}ms`;
            el.innerHTML = `
                <div class="card-meta">
                    <div class="source-badge">
                        <span class="source-dot"></span>
                        <span class="source-name">${item.source}</span>
                    </div>
                    <span class="card-date">${item.date}</span>
                </div>
                <div class="card-title">${item.title}</div>
                <div class="card-summary">${item.summary}</div>
                <div class="card-footer">
                    <a href="${item.link}" target="_blank" rel="noopener" class="card-link">Lire l'article ↗</a>
                    <span class="card-tag">${item.category === 'fiscal' ? 'Fiscal' : 'Comptabilité'}</span>
                </div>`;
            container.appendChild(el);
        });
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-fiscal').className = `tab-btn ${tab === 'fiscal' ? 'active-fiscal' : ''}`;
        document.getElementById('tab-compta').className = `tab-btn ${tab === 'compta' ? 'active-compta' : ''}`;
        renderNews();
    }

    function resetFilters() {
        searchInput.value = '';
        dateInput.value = '';
        renderNews();
    }

    searchInput.addEventListener('input', renderNews);
    dateInput.addEventListener('change', renderNews);
    loadNews();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
