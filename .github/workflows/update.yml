name: Mise à jour VeilleCG

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installation des dépendances
        run: pip install feedparser requests
      - name: Exécution du script
        run: python update.py
      - name: Commit et push
        run: |
          git config user.name "VeilleCG Bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "Mise à jour veille $(date +'%d/%m/%Y %H:%M')"
          git push
